[Settings]
language = en
folder = ~/.config/backgrounds
monitors = All
wallpaper = ~/.config/backgrounds/car-with-full-moon-background.jpg
backend = swww
fill = fill
sort = name
color = #101418
subfolders = False
show_hidden = False
show_gifs_only = False
show_transition_options = True
post_command = matugen image $wallpaper && cp "$wallpaper" ~/.config/sddm/current.jpg
number_of_columns = 3
swww_transition_type = any
swww_transition_step = 90
swww_transition_angle = 0
swww_transition_duration = 2
swww_transition_fps = 60
use_xdg_state = False
show_path_in_tooltip = True
all_subfolders = False
zen_mode = False
mpvpaper_sound = False
mpvpaper_options = 
stylesheet = /home/daniel/.config/waypaper/style.css

