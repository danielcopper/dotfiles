##### General #################################################################
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g allow-passthrough on
set -g escape-time 0
set -g focus-events on
set -g history-limit 100000
set -s copy-command "clip.exe"        # WSL clipboard
set -g base-index 1                   # start windows at 1
setw -g pane-base-index 1             # start panes at 1
set -g renumber-windows on            # renumber when closing windows
set -g detach-on-destroy off          # switch session instead of exit

##### Pane styling ############################################################
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

##### Prefix & navigation #####################################################
unbind C-b
unbind p                              # was previous-window, reclaim from floax
set -g prefix C-Space
bind C-Space send-prefix
set -g mouse on
setw -g mode-keys vi

# Splits/new windows
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane movement (Vim style)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize panes (Shift + hjkl)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# Sync panes toggle
bind S setw synchronize-panes\; display-message "synchronize-panes: #{?pane_synchronized,on,off}"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"

##### Copy / paste ############################################################
bind Escape copy-mode -u
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe"
bind -T copy-mode-vi Y send -X copy-end-of-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind y capture-pane -J \; run "tmux save-buffer - | clip.exe" \; display-message 'copied pane to clipboard'

set -g set-clipboard on

##### Status bar ##############################################################
set -g status-interval 5
set -g status-position top

##### TPM & Plugins ###########################################################
# git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'catppuccin/tmux'

##### Plugin config ###########################################################
# Resurrect & Continuum
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# fzf-url
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# Sessionx
set -g @sessionx-bind 'o'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-filter-current 'false'

# Floax (floating panes)
set -g @floax-bind '-n M-f'            # Alt+f to toggle (no prefix needed)
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-change-path 'true'

##### Catppuccin (v2.x config) ################################################
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_flags 'icon'

run '~/.config/tmux/plugins/tpm/tpm'

# Status line (must be AFTER catppuccin loads)
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

