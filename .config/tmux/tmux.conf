##### General #################################################################
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g allow-passthrough on
set -g escape-time 0
set -g focus-events on
set -g extended-keys always
set -as terminal-features 'xterm*:extkeys'
set -g history-limit 100000
# set -s copy-command "wl-copy"      # disabled: using OSC 52 via WezTerm instead
set -g base-index 1                   # start windows at 1
setw -g pane-base-index 1             # start panes at 1
set -g renumber-windows on            # renumber when closing windows
set -g detach-on-destroy off          # switch session instead of exit

##### Pane styling ############################################################
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'
set -g window-style 'fg=colour245'
set -g window-active-style 'fg=colour255'

##### Prefix & navigation #####################################################
unbind C-b
unbind p
bind p previous-window
set -g prefix C-Space
bind C-Space send-prefix
set -g mouse on
setw -g mode-keys vi

# Splits/new windows
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane movement (Vim style)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize panes (Shift + hjkl)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# Sync panes toggle
bind S setw synchronize-panes\; display-message "synchronize-panes: #{?pane_synchronized,on,off}"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"

##### Copy / paste ############################################################
bind Escape copy-mode -u
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Y send -X copy-end-of-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel
bind y capture-pane -J \; save-buffer - \; display-message 'copied pane to clipboard'

set -g set-clipboard on

##### Status bar ##############################################################
set -g status-interval 5
set -g status-position top

##### TPM & Plugins ###########################################################
# git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

##### Plugin config ###########################################################
# Resurrect & Continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '7'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# fzf-url
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# Sessionx
set -g @sessionx-bind 'o'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-filter-current 'false'

# Which-key
set -g @wk_cfg_key_prefix_table '?'

# Floax (floating panes)
set -g @floax-bind '-n M-f'            # Alt+f to toggle (no prefix needed)
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-change-path 'true'

##### Catppuccin (v2) #########################################################
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background 'none'
set -g @catppuccin_window_status_style 'none'
set -g @catppuccin_status_left_separator ''
set -g @catppuccin_status_right_separator ' '
set -g @catppuccin_status_connect_separator 'no'
set -g @catppuccin_application_text '  #{pane_current_command} '
set -g @catppuccin_directory_text '  #{b:pane_current_path} '
set -g @catppuccin_cpu_icon "󰻠 "
set -g @catppuccin_cpu_text ' #{l:#{cpu_percentage}} '
set -g @catppuccin_ram_icon "󰘚 "
set -g @catppuccin_ram_text ' #{l:#{ram_percentage}} '
set -g @catppuccin_date_time_text '  %H:%M '

run '~/.config/tmux/plugins/tpm/tpm'

# Load custom RAM module
source -F '#{d:current_file}/plugins/tmux/status/ram.conf'

##### Window formats (omerxx style, manual for transparent bg) ################
# Mocha palette:
#   base=#1e1e2e  surface_0=#313244  surface_1=#45475a
#   overlay_2=#9399b2  mauve=#cba6f7  crust=#11111b  fg=#cdd6f4

# Default window:  (text on surface_0)  █(number on overlay_2)
set -g window-status-format "#[fg=#9399b2,bg=default]#[fg=#11111b,bg=#9399b2] #I #[fg=#313244,bg=#9399b2]█#[fg=#f5e0dc,bg=#313244]  #[fg=#cdd6f4]#{b:pane_current_path} #[fg=#cba6f7] #[fg=#cdd6f4]#W #[fg=#313244,bg=default]"

# Current window:  (text on surface_1)  █(number on mauve)
set -g window-status-current-format "#[fg=#cba6f7,bg=default]#[fg=#11111b,bg=#cba6f7] #I #[fg=#45475a,bg=#cba6f7]█#[fg=#f5e0dc,bg=#45475a]  #[fg=#cdd6f4]#{b:pane_current_path} #[fg=#cba6f7] #[fg=#cdd6f4]#W#{?window_zoomed_flag, (󰊓),} #[fg=#45475a,bg=default]"

##### Status line ##############################################################
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -gF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -agF status-right "#{E:@catppuccin_status_date_time}"

# Re-run cpu/battery plugins to interpolate their format strings
run '~/.config/tmux/plugins/tmux-cpu/cpu.tmux'
run '~/.config/tmux/plugins/tmux-battery/battery.tmux'

# Re-inject continuum auto-save hook (our status-right overrides wipe it)
set -ag status-right '#(~/.config/tmux/plugins/tmux-continuum/scripts/continuum_save.sh)'
