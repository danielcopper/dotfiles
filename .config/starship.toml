# Starship config - generated by matugen
# Template: ~/.config/matugen/templates/starship.toml

palette = "matugen"

format = """\
[╭╴](muted)$os\
$all[╰─](muted)$character"""

[character]
success_symbol = "[[♥](primary) ❯](secondary)"
error_symbol = "[❯](error)"
vimcmd_symbol = "[❮](primary)"

[directory]
truncation_length = 4
style = "bold primary"

[username]
show_always = true
style_user = "secondary"
style_root = "error"

[os]
format = '[$symbol](bold text)'
disabled = false

[os.symbols]
Windows = " "
Arch = "󰣇 "
Ubuntu = " "
Linux = "󰌽 "

[git_branch]
symbol = ' '
style = "tertiary"

[git_status]
style = "tertiary"

# Palette generated by matugen from wallpaper
[palettes.matugen]
# Main accent colors
primary = "#d2bcfd"
secondary = "#cdc2db"
tertiary = "#f0b8c6"

# Semantic colors
error = "#ffb4ab"
success = "#d2bcfd"

# Text colors
text = "#e7e0e8"
subtext = "#cbc4cf"
muted = "#948f99"

# Surface colors
surface = "#141218"
background = "#211f24"
