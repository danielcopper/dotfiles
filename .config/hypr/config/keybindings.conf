###################
### KEYBINDINGS ###
###################

# KEYBINDING SCHEMA:
# -----------------
# Super + key              = Apps & window focus
# Super + Shift + key      = Power-Version / Move / Workspace ops
#                            (z.B. C=close, Shift+C=force close)
# Super + Ctrl + key       = System actions (lock, etc.)
# Super + Alt + key        = Quick menus & toggles
# Print variations         = Screenshots

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod SHIFT, E, exit,
bind = $mainMod, T, togglefloating,
bind = $mainMod, F, fullscreen,
bind = $mainMod, Space, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod SHIFT, R, togglesplit, # dwindle

# Lock
bind = $mainMod CTRL, L, exec, hyprlock

# Reload waybar
bind = $mainMod CTRL, W, exec, killall waybar; waybar &

# Global Monitor-Fokus (funktioniert auch bei Moonlight/Games)
bind = $mainMod, Tab, exec, hyprctl dispatch focusmonitor r
bind = $mainMod SHIFT, Tab, exec, hyprctl dispatch focusmonitor l

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Vim-style focus
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# Vim-style move winodws
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness (with swayosd overlay)
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Screenshots (Print key variations)
bind = , Print, exec, hyprshot -m region
bind = $mainMod, Print, exec, hyprshot -m window
bind = SHIFT, Print, exec, hyprshot -m output

# Quick menus (Super + Alt)
bind = $mainMod ALT, B, exec, bzmenu -l walker
bind = $mainMod ALT, N, exec, networkmanager_dmenu
bind = $mainMod ALT, V, exec, pavucontrol
bind = $mainMod ALT, P, exec, ~/.config/hypr/scripts/wlogout-wrapper.sh

# Clipboard history
bind = $mainMod, V, exec, walker -m clipboard

# Scratchpads (pyprland)
bind = $mainMod, grave, exec, pypr toggle term
bind = $mainMod, M, exec, pypr toggle music

# Keybind-Helper (whichkey-style)
bind = $mainMod, slash, exec, ~/.config/hypr/scripts/hypr-keybinds
