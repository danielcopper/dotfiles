##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# Waypaper floating
windowrule = float,class:^(waypaper)$
windowrule = size 900 600,class:^(waypaper)$
windowrule = center,class:^(waypaper)$

# Pavucontrol floating
windowrule = float,class:^(org.pulseaudio.pavucontrol)$
windowrule = size 800 600,class:^(org.pulseaudio.pavucontrol)$
windowrule = center,class:^(org.pulseaudio.pavucontrol)$

# Vivaldi popups (Bitwarden, Extensions) als floating overlay
windowrule = float,class:^(vivaldi)$,title:^(Bitwarden)
windowrule = float,class:^(vivaldi)$,title:^(Extension:)
windowrule = center,class:^(vivaldi)$,title:^(Bitwarden)
windowrule = center,class:^(vivaldi)$,title:^(Extension:)

# Walker launcher layer rules
layerrule = blur, walker
layerrule = ignorealpha 0.5, walker

# Wlogout layer rules (blur effect)
layerrule = blur, logout_dialog
layerrule = ignorealpha 0.5, logout_dialog

# Waypaper-Engine floating
windowrule = float,class:^(waypaper-engine)$
windowrule = size 1000 700,class:^(waypaper-engine)$
windowrule = center,class:^(waypaper-engine)$
