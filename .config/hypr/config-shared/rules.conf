##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Ignore maximize requests from apps. You'll probably like this.
windowrule = match:class .*, suppress_event maximize

# Fix some dragging issues with XWayland
windowrule = match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false, no_focus on

# Waypaper floating
windowrule = match:class ^(waypaper)$, float on
windowrule = match:class ^(waypaper)$, size 900 600
windowrule = match:class ^(waypaper)$, center on

# Pavucontrol floating
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, size 800 600
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, center on

# Vivaldi popups (Bitwarden, Extensions) als floating overlay
windowrule = match:class ^(vivaldi)$, match:title ^(Bitwarden), float on
windowrule = match:class ^(vivaldi)$, match:title ^(Extension:), float on
windowrule = match:class ^(vivaldi)$, match:title ^(Bitwarden), center on
windowrule = match:class ^(vivaldi)$, match:title ^(Extension:), center on

# Walker launcher layer rules
layerrule = match:namespace walker, blur on
layerrule = match:namespace walker, ignore_alpha 0.5

# Wlogout layer rules (blur effect)
layerrule = match:namespace logout_dialog, blur on
layerrule = match:namespace logout_dialog, ignore_alpha 0.5

# Waypaper-Engine floating
windowrule = match:class ^(waypaper-engine)$, float on
windowrule = match:class ^(waypaper-engine)$, size 1000 700
windowrule = match:class ^(waypaper-engine)$, center on
