# Hyprland config - Current setup (waybar, walker, etc.)

# Shared configs (used by both setups)
source = ~/.config/hypr/config-shared/monitors.conf
source = ~/.config/hypr/config-shared/environment.conf
source = ~/.config/hypr/config-shared/appearance.conf
source = ~/.config/hypr/config-shared/input.conf
source = ~/.config/hypr/config-shared/rules.conf

# Current setup specific configs
source = ~/.config/hypr/config/programs.conf
source = ~/.config/hypr/config/autostart.conf
source = ~/.config/hypr/config/keybindings.conf

# Dynamic colors from matugen
source = ~/.config/hypr/colors.conf

# Misc settings (DPMS/sleep fixes)
misc {
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    allow_session_lock_restore = true
}
