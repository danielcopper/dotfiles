# Starship config - generated by matugen
# Template: ~/.config/matugen/templates/starship.toml

palette = "matugen"

format = """\
[╭╴](muted)$os\
$all[╰─](muted)$character"""

[character]
success_symbol = "[[♥](primary) ❯](secondary)"
error_symbol = "[❯](error)"
vimcmd_symbol = "[❮](primary)"

[directory]
truncation_length = 4
style = "bold primary"

[username]
show_always = true
style_user = "secondary"
style_root = "error"

[os]
format = '[$symbol](bold text)'
disabled = false

[os.symbols]
Windows = " "
Arch = "󰣇 "
Ubuntu = " "
Linux = "󰌽 "

[git_branch]
symbol = ' '
style = "tertiary"

[git_status]
style = "tertiary"

# Palette generated by matugen from wallpaper
[palettes.matugen]
# Main accent colors
primary = "#{{colors.primary.default.hex_stripped}}"
secondary = "#{{colors.secondary.default.hex_stripped}}"
tertiary = "#{{colors.tertiary.default.hex_stripped}}"

# Semantic colors
error = "#{{colors.error.default.hex_stripped}}"
success = "#{{colors.primary.default.hex_stripped}}"

# Text colors
text = "#{{colors.on_surface.default.hex_stripped}}"
subtext = "#{{colors.on_surface_variant.default.hex_stripped}}"
muted = "#{{colors.outline.default.hex_stripped}}"

# Surface colors
surface = "#{{colors.surface.default.hex_stripped}}"
background = "#{{colors.surface_container.default.hex_stripped}}"
