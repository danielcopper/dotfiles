# NVIDIA HDMI audio has a hardware volume dead zone - audio mutes completely
# below ~45% volume. This forces software volume control to bypass that issue.
# Affects all HDMI outputs on this GPU.
# See: https://bbs.archlinux.org/viewtopic.php?id=308235

monitor.alsa.rules = [
  {
    matches = [
      { device.name = "alsa_card.pci-0000_2b_00.1" }
    ]
    actions = {
      update-props = {
        api.alsa.soft-mixer = true
      }
    }
  }
]
