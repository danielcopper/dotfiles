# WSL-arch-specific tmux overrides. Sourced from shared tmux.conf via if-shell.

# Use clip.exe for the system clipboard (no native Wayland/X on WSL)
set -s copy-command "clip.exe"

# In copy-mode-vi, pipe `y` directly to clip.exe so the selection lands on the
# Windows clipboard, not just the tmux internal buffer.
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe"
