##### General #################################################################
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g allow-passthrough on
set -g escape-time 0
set -g focus-events on
set -g extended-keys always
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'
set -g history-limit 100000
set -g base-index 1                   # start windows at 1
setw -g pane-base-index 1             # start panes at 1
set -g renumber-windows on            # renumber when closing windows
set -g detach-on-destroy off          # switch session instead of exit

##### Pane styling ############################################################
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'
set -g window-style 'fg=colour245'
set -g window-active-style 'fg=colour255'

##### Prefix & navigation #####################################################
unbind C-b
unbind p
bind p previous-window
set -g prefix C-Space
bind C-Space send-prefix
set -g mouse on
setw -g mode-keys vi

# Splits/new windows
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane movement (Vim style)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize panes (Shift + hjkl)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# Sync panes toggle
bind S setw synchronize-panes\; display-message "synchronize-panes: #{?pane_synchronized,on,off}"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"

# Session switcher — fzf inside a tmux popup. Replaces the default
# `prefix s` (choose-tree). Plain `fzf`, not `fzf-tmux`, because we
# already provide the popup via display-popup; nesting them collapses
# the inner one immediately.
bind s display-popup -E -w 60% -h 60% "tmux list-sessions -F '#S' | fzf --reverse --prompt='session: ' | xargs -r tmux switch-client -t"

##### Copy / paste ############################################################
bind Escape copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Y send -X copy-end-of-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

set -g set-clipboard on

##### Status bar ##############################################################
set -g status-interval 5
set -g status-position top

##### TPM & Plugins ###########################################################
# git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

##### Plugin config ###########################################################
# Resurrect & Continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '7'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Which-key
set -g @wk_cfg_key_prefix_table '?'

##### Catppuccin (v2) #########################################################
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background 'none'
set -g @catppuccin_window_status_style 'none'
# Flat sections — matches lualine's section_separators = "" aesthetic.
# Each module renders as its own coloured block, no powerline arrows or
# chevrons between them.
set -g @catppuccin_status_left_separator ' '
set -g @catppuccin_status_middle_separator ''
set -g @catppuccin_status_right_separator ''
set -g @catppuccin_status_connect_separator 'no'
set -g @catppuccin_application_text '#{pane_current_command}'
set -g @catppuccin_directory_text '#{b:pane_current_path}'
set -g @catppuccin_session_icon "   "
set -g @catppuccin_session_text '  #S '
set -g @catppuccin_cpu_icon " 󰻠 "
set -g @catppuccin_cpu_text ' #{l:#{cpu_percentage}}  '
set -g @catppuccin_battery_icon " #{l:#{battery_icon}} "
set -g @catppuccin_battery_text ' #{l:#{battery_percentage}}  '
set -g @catppuccin_date_time_icon " 󰃰 "
set -g @catppuccin_date_time_text ' %H:%M  '

# Soft Mocha palette — dunkler unified body (surface_0), nur die Icons
# tragen die Modul-Farbe. Reduziert die "Latte-Helligkeit" der bunten
# Default-Backgrounds. Lualine-konform.
set -gF @catppuccin_status_cpu_icon_bg "#{E:@thm_surface_0}"
set -gF @catppuccin_status_cpu_icon_fg "#{E:@thm_yellow}"
set -gF @catppuccin_status_battery_icon_bg "#{E:@thm_surface_0}"
set -gF @catppuccin_status_battery_icon_fg "#{E:@thm_lavender}"
set -gF @catppuccin_status_date_time_icon_bg "#{E:@thm_surface_0}"
set -gF @catppuccin_status_date_time_icon_fg "#{E:@thm_sapphire}"

# RAM is added inline below as two flat blocks — catppuccin tmux v2 has
# no built-in RAM module, but the docs' custom-status pattern (icon
# block + text block) is much simpler than the MODULE_NAME / source
# utils/status_module.conf dance and avoids coupling to plugin internals.

run '~/.config/tmux/plugins/tpm/tpm'

##### Window formats (flat blocks, transparent base) #########################
# Mocha palette:
#   base=#1e1e2e  surface_0=#313244  surface_1=#45475a
#   overlay_2=#9399b2  mauve=#cba6f7  crust=#11111b  fg=#cdd6f4

# Both formats: surface bg only, colored numbers + symbols. Active uses
# surface_1 + mauve+bold number, inactive uses surface_0 + subtext1 number.
set -g window-status-format "#[bg=#313244,fg=#bac2de] #I #[fg=#f5e0dc]  #[fg=#cdd6f4]#{b:pane_current_path} #[fg=#f2cdcd] #[fg=#cdd6f4]#W #[default]"

# Current window: number block on mauve, body block on surface_1.
set -g window-status-current-format "#[bg=#45475a,fg=#eba0ac,bold] #I #[fg=#f5e0dc,nobold]  #[fg=#cdd6f4]#{b:pane_current_path} #[fg=#f2cdcd] #[fg=#cdd6f4,bold]#W#{?window_zoomed_flag, (󰊓),} #[default]"

##### Status line ##############################################################
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session} "
set -gF status-right "#{E:@catppuccin_status_cpu}"
# Inline RAM (no built-in catppuccin module): icon block + value block.
# Wrap the percentage in #{l:...} so set -agF only expands the theme
# vars at set-time; the percentage itself resolves at draw-time when
# tmux-cpu has registered #{ram_percentage}.
set -agF status-right "#[bg=default] #[bg=#{@thm_surface_0},fg=#{@thm_green}] 󰘚 "
set -agF status-right "#[bg=#{@thm_surface_0},fg=#{@thm_fg}] #{l:#{ram_percentage}}  "
set -agF status-right "#{E:@catppuccin_status_battery}"
set -agF status-right "#{E:@catppuccin_status_date_time}"

# Re-run cpu/battery plugins to interpolate their format strings
run '~/.config/tmux/plugins/tmux-cpu/cpu.tmux'
run '~/.config/tmux/plugins/tmux-battery/battery.tmux'

# Re-inject continuum auto-save hook (our status-right overrides wipe it)
set -ag status-right '#(~/.config/tmux/plugins/tmux-continuum/scripts/continuum_save.sh)'

##### Per-host overrides ######################################################
# Class-specific tweaks (clipboard, etc.) live in host-<class>/.config/tmux/tmux.local.conf
if-shell "test -f ~/.config/tmux/tmux.local.conf" "source-file ~/.config/tmux/tmux.local.conf"
