##### General #################################################################
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g allow-passthrough on
set -g escape-time 0
set -g focus-events on
set -g extended-keys always
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off          # switch instead of exit on last-window kill

##### Pane styling ############################################################
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'
set -g window-style 'fg=colour245'
set -g window-active-style 'fg=colour255'

##### Prefix & navigation #####################################################
unbind C-b
unbind p
bind p previous-window
set -g prefix C-Space
bind C-Space send-prefix
set -g mouse on
setw -g mode-keys vi

# Splits/new windows
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane movement (Vim style)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize panes (Shift + hjkl)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"

# Sessions: lowercase s = fzf fast-switch, uppercase S = choose-tree (X kills, r renames).
# Plain `fzf`, not `fzf-tmux` — nesting two popups collapses the inner.
bind s display-popup -E -w 60% -h 60% "tmux list-sessions -F '#S' | fzf --reverse --prompt='session: ' | xargs -r tmux switch-client -t"
bind S choose-tree -Zs

##### Copy / paste ############################################################
bind Escape copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Y send -X copy-end-of-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

set -g set-clipboard on

##### Plugins #################################################################
# git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'alexwforsythe/tmux-which-key'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '7'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @wk_cfg_key_prefix_table '?'

##### Theme: Catppuccin Mocha #################################################
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background 'none'
set -g @catppuccin_window_status_style 'none'

# Flat blocks — empty separators, lualine's section_separators = "" twin.
set -g @catppuccin_status_left_separator ' '
set -g @catppuccin_status_middle_separator ''
set -g @catppuccin_status_right_separator ''
set -g @catppuccin_status_connect_separator 'no'
set -g @catppuccin_application_text '#{pane_current_command}'
set -g @catppuccin_directory_text '#{b:pane_current_path}'
set -g @catppuccin_session_icon "   "
set -g @catppuccin_session_text '  #S '
set -g @catppuccin_cpu_icon " 󰻠 "
set -g @catppuccin_cpu_text ' #{l:#{cpu_percentage}}  '
set -g @catppuccin_battery_icon " #{l:#{battery_icon}} "
set -g @catppuccin_battery_text ' #{l:#{battery_percentage}}  '
set -g @catppuccin_date_time_icon " 󰃰 "
set -g @catppuccin_date_time_text ' %H:%M  '

set -gF @catppuccin_status_cpu_icon_bg "#{E:@thm_surface_0}"
set -gF @catppuccin_status_cpu_icon_fg "#{E:@thm_yellow}"
set -gF @catppuccin_status_battery_icon_bg "#{E:@thm_surface_0}"
set -gF @catppuccin_status_battery_icon_fg "#{E:@thm_lavender}"
set -gF @catppuccin_status_date_time_icon_bg "#{E:@thm_surface_0}"
set -gF @catppuccin_status_date_time_icon_fg "#{E:@thm_sapphire}"

run '~/.config/tmux/plugins/tpm/tpm'

##### Statusline ##############################################################
set -g status-position top
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100

set -g window-status-format "#[bg=#313244,fg=#bac2de] #I #[fg=#f5e0dc]  #[fg=#cdd6f4]#{b:pane_current_path} #[fg=#f2cdcd] #[fg=#cdd6f4]#W #[default]"
set -g window-status-current-format "#[bg=#45475a,fg=#eba0ac,bold] #I #[fg=#f5e0dc,nobold]  #[fg=#cdd6f4]#{b:pane_current_path} #[fg=#f2cdcd] #[fg=#cdd6f4,bold]#W#{?window_zoomed_flag, (󰊓),} #[default]"

set -g status-left "#{E:@catppuccin_status_session} "
set -gF status-right "#{E:@catppuccin_status_cpu}"
# Inline RAM — #{l:...} defers #{ram_percentage} to draw time.
set -agF status-right "#[bg=default] #[bg=#{@thm_surface_0},fg=#{@thm_green}] 󰘚 "
set -agF status-right "#[bg=#{@thm_surface_0},fg=#{@thm_fg}] #{l:#{ram_percentage}}  "
set -agF status-right "#{E:@catppuccin_status_battery}"
set -agF status-right "#{E:@catppuccin_status_date_time}"

# Re-trigger after our manual status-right writes; tpm fires these once before us.
run '~/.config/tmux/plugins/tmux-cpu/cpu.tmux'
run '~/.config/tmux/plugins/tmux-battery/battery.tmux'
set -ag status-right '#(~/.config/tmux/plugins/tmux-continuum/scripts/continuum_save.sh)'

##### Per-host overrides ######################################################
if-shell "test -f ~/.config/tmux/tmux.local.conf" "source-file ~/.config/tmux/tmux.local.conf"
