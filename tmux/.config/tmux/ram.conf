# vim:set ft=tmux:
%hidden MODULE_NAME="ram"

set -ogq "@catppuccin_${MODULE_NAME}_icon" " "
set -ogqF "@catppuccin_${MODULE_NAME}_color" "#{E:@thm_green}"
set -ogq "@catppuccin_${MODULE_NAME}_text" "  #{ram_percentage} "

# Catppuccin's status-module renderer ships inside the plugin install; sourcing
# directly from there because the renderer is the documented extension point
# for custom modules. Plugin breakage = path breakage; tracked in the tmux
# entknoten task.
source -F "#{d:current_file}/plugins/tmux/utils/status_module.conf"
