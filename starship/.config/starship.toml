# Starship config - generated by matugen
# Template: ~/.config/matugen/templates/starship.toml

palette = "matugen"

format = """\
[╭╴](muted)$os\
$all[╰─](muted)$character"""

[character]
success_symbol = "[[♥](primary) ❯](secondary)"
error_symbol = "[❯](error)"
vimcmd_symbol = "[❮](primary)"

[directory]
truncation_length = 4
style = "bold primary"

[username]
show_always = true
style_user = "secondary"
style_root = "error"

[os]
format = '[$symbol](bold text)'
disabled = false

[os.symbols]
Windows = " "
Arch = "󰣇 "
Ubuntu = " "
Linux = "󰌽 "

[git_branch]
symbol = ' '
style = "tertiary"

[git_status]
style = "tertiary"

# Palette generated by matugen from wallpaper
[palettes.matugen]
# Main accent colors
primary = "#ccbeff"
secondary = "#cac3dc"
tertiary = "#eeb8cb"

# Semantic colors
error = "#ffb4ab"
success = "#ccbeff"

# Text colors
text = "#e6e1e9"
subtext = "#cac4cf"
muted = "#938f99"

# Surface colors
surface = "#141318"
background = "#201f24"
