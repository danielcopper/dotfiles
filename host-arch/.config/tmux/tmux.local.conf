# Arch-specific tmux overrides. Sourced from shared tmux.conf via if-shell.

# SSH askpass / DBus integration for the arch desktop session
set-environment -g SSH_ASKPASS '/usr/bin/ksshaskpass'
set-environment -g SSH_ASKPASS_REQUIRE 'prefer'
set-environment -g DBUS_SESSION_BUS_ADDRESS 'unix:path=/run/user/1000/bus'

# Copy-command stays disabled: using OSC 52 via WezTerm instead.
# set -s copy-command "wl-copy"
